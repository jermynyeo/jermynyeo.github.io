name: Refine learnings

# Runs whenever you add/edit a note in learnings/drafts/.
# Refines each note with the Claude API and publishes learnings/reflections.json.
on:
  push:
    branches: [main]
    paths:
      - "learnings/drafts/**"
      - "scripts/refine-learnings.mjs"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install --no-save @anthropic-ai/sdk

      - name: Refine drafts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/refine-learnings.mjs

      - name: Commit published reflections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add learnings/reflections.json
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Publish refined learnings [skip ci]"
            git push
          fi
